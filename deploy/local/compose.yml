name: diet-tracker-local

services:
  mysql:
    image: mysql:8.0.46
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: diet_tracker
      MYSQL_USER: diet_tracker
      MYSQL_PASSWORD: local-diet-tracker-password
      MYSQL_ROOT_PASSWORD: local-root-password
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --host=127.0.0.1 --user=root --password=$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    image: diet-tracker-backend:local
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_TIME: ${BUILD_TIME:-1970-01-01T00:00:00Z}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/diet_tracker?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia%2FShanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: diet_tracker
      DB_PASSWORD: local-diet-tracker-password
      WECHAT_APPID: ${WECHAT_APPID:-wx8cfee49a3f7392b2}
      WECHAT_SECRET: ${WECHAT_SECRET:-local-placeholder-not-valid-for-login}
      JWT_SECRET: ${JWT_SECRET:-local-only-jwt-secret-at-least-32-characters}
      DELETION_AUDIT_PEPPER: ${DELETION_AUDIT_PEPPER:-local-only-independent-pepper-at-least-32-characters}
      APP_BASE_URL: http://${LOCAL_LAN_IP:-192.168.3.25}:${BACKEND_BIND_PORT:-8080}
      UPLOAD_DIR: /var/lib/diet-tracker/uploads/avatars
      CORS_ALLOWED_ORIGINS: http://localhost:*
      SPRING_PROFILES_ACTIVE: local
      RATE_LIMIT_ENABLED: "false"
      TZ: Asia/Shanghai
    ports:
      - 0.0.0.0:${BACKEND_BIND_PORT:-8080}:8080
    volumes:
      - avatar-data:/var/lib/diet-tracker/uploads/avatars
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m

volumes:
  mysql-data:
  avatar-data:
