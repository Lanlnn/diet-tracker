name: diet-tracker-staging

services:
  mysql:
    image: mysql:8.0.46
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: diet_tracker_staging
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --host=127.0.0.1 --user=root --password=$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  backend:
    image: diet-tracker-backend:${BACKEND_IMAGE_TAG:?BACKEND_IMAGE_TAG is required}
    build:
      context: ../../backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:?GIT_SHA is required}
        BUILD_TIME: ${BUILD_TIME:?BUILD_TIME is required}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      WECHAT_APPID: ${WECHAT_APPID:?WECHAT_APPID is required}
      WECHAT_SECRET: ${WECHAT_SECRET:?WECHAT_SECRET is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DELETION_AUDIT_PEPPER: ${DELETION_AUDIT_PEPPER:?DELETION_AUDIT_PEPPER is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      UPLOAD_DIR: ${UPLOAD_DIR:?UPLOAD_DIR is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:?SPRING_PROFILES_ACTIVE is required}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:?RATE_LIMIT_ENABLED is required}
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      TZ: Asia/Shanghai
    ports:
      - 127.0.0.1:${BACKEND_BIND_PORT:-18080}:8080
    volumes:
      - ${UPLOAD_DIR:?UPLOAD_DIR is required}:${UPLOAD_DIR:?UPLOAD_DIR is required}
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

networks:
  internal:
    driver: bridge

volumes:
  mysql-data:
