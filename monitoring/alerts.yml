groups:
  - name: diet-tracker-release-gates
    interval: 1m
    rules:
      - alert: DietTrackerHealthDown
        expr: up{job="diet-tracker"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: Diet Tracker health probe has failed for three minutes

      - alert: DietTrackerApiHighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{application="diet-tracker",uri=~"/api/.*",status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{application="diet-tracker",uri=~"/api/.*"}[5m])), 0.001)
          > 0.02
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: API 5xx rate is above 2 percent

      - alert: DietTrackerDashboardP95TooHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{application="diet-tracker",uri="/api/dashboard/today"}[10m])))
          > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Dashboard API P95 is above 800 milliseconds

      - alert: DietTrackerFoodSearchP95TooHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(http_server_requests_seconds_bucket{application="diet-tracker",uri="/api/foods/search"}[10m])))
          > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Food search API P95 is above 500 milliseconds

      - alert: DietTrackerAnalyticsP95TooHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le, uri) (rate(http_server_requests_seconds_bucket{application="diet-tracker",uri=~"/api/(calendar/summary|stats/trend)"}[10m])))
          > 1.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Calendar or trend API P95 is above 1.2 seconds

      - alert: DietTrackerRateLimitSurge
        expr: |
          sum(rate(http_server_requests_seconds_count{application="diet-tracker",uri=~"/api/.*",status="429"}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count{application="diet-tracker",uri=~"/api/.*"}[5m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: More than 5 percent of API requests are being rate limited
