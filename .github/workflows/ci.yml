name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  miniapp-static:
    name: Miniapp static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        run: find miniapp -type f -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check JSON syntax
        run: node -e "const fs=require('fs'); const path=require('path'); const walk=p=>fs.readdirSync(p,{withFileTypes:true}).flatMap(e=>e.isDirectory()?walk(path.join(p,e.name)):path.join(p,e.name)); for(const file of walk('miniapp').filter(f=>f.endsWith('.json'))) JSON.parse(fs.readFileSync(file,'utf8'));"

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run Maven tests
        working-directory: backend
        run: sh mvnw --batch-mode test
