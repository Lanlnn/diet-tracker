spring.datasource.url=${MYSQL_TEST_DB_URL:jdbc:mysql://127.0.0.1:3306/diet_tracker_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_TEST_DB_USERNAME:root}
spring.datasource.password=${MYSQL_TEST_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.sql.init.mode=never
wechat.appid=${TEST_WECHAT_APPID:test-appid}
wechat.secret=${TEST_WECHAT_SECRET:test-secret}
jwt.secret=${TEST_JWT_SECRET:test-only-jwt-secret-with-more-than-thirty-two-bytes}
admin.jwt.secret=${TEST_ADMIN_JWT_SECRET:test-only-admin-jwt-secret-separated-and-long-enough}
app.base-url=http://localhost:8080
app.upload.dir=target/test-uploads
app.cors.allowed-origins=http://localhost:*
