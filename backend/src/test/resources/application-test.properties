spring.datasource.url=${TEST_DB_URL:jdbc:h2:mem:diet_tracker;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${TEST_DB_USERNAME:sa}
spring.datasource.password=${TEST_DB_PASSWORD:}
spring.datasource.driver-class-name=${TEST_DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${TEST_JPA_DDL_AUTO:create-drop}
spring.flyway.enabled=${TEST_FLYWAY_ENABLED:false}
wechat.appid=${TEST_WECHAT_APPID:test-appid}
wechat.secret=${TEST_WECHAT_SECRET:test-secret}
jwt.secret=${TEST_JWT_SECRET:test-only-jwt-secret-with-more-than-thirty-two-bytes}
app.base-url=http://localhost:8080
app.upload.dir=target/test-uploads
app.cors.allowed-origins=http://localhost:*
app.deletion.audit-pepper=test-only-deletion-audit-pepper
