server.port=${SERVER_PORT:8080}
spring.profiles.default=local
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
server.tomcat.max-swallow-size=2MB

wechat.appid=${WECHAT_APPID}
wechat.secret=${WECHAT_SECRET}
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:604800000}
app.upload.dir=${UPLOAD_DIR:./var/uploads/avatars}
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*}
app.time-zone=${APP_TIME_ZONE:Asia/Shanghai}
app.deletion.audit-pepper=${DELETION_AUDIT_PEPPER:${jwt.secret}}
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:false}
app.rate-limit.requests-per-minute=${RATE_LIMIT_REQUESTS_PER_MINUTE:120}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
app.exercise.kcal-per-minute.walking=${EXERCISE_RATE_WALKING:4.0}
app.exercise.kcal-per-minute.running=${EXERCISE_RATE_RUNNING:8.0}
app.exercise.kcal-per-minute.cycling=${EXERCISE_RATE_CYCLING:6.5}
app.exercise.kcal-per-minute.strength=${EXERCISE_RATE_STRENGTH:6.0}
app.exercise.kcal-per-minute.yoga=${EXERCISE_RATE_YOGA:3.0}
app.exercise.kcal-per-minute.stretching=${EXERCISE_RATE_STRETCHING:2.5}
app.exercise.kcal-per-minute.other=${EXERCISE_RATE_OTHER:4.0}
app.exercise.intensity-factor.low=${EXERCISE_INTENSITY_LOW:0.8}
app.exercise.intensity-factor.medium=${EXERCISE_INTENSITY_MEDIUM:1.0}
app.exercise.intensity-factor.high=${EXERCISE_INTENSITY_HIGH:1.25}

logging.level.root=INFO
logging.level.com.diettracker=INFO
